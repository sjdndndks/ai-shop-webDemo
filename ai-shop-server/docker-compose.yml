services:
  postgres:
    image: postgres:16
    container_name: ai-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ai_shop_postgres_data:/var/lib/postgresql/data

volumes:
  ai_shop_postgres_data:
